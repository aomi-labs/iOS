name: Aomi
options:
  bundleIdPrefix: io.aomi
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: KXSWJN7WY8

packages:
  ParaSwift:
    url: https://github.com/getpara/swift-sdk
    exactVersion: "2.6.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  Aomi:
    type: application
    platform: iOS
    sources:
      - path: Aomi
    entitlements:
      path: Aomi/Aomi.entitlements
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: "1.0.0"
        INFOPLIST_FILE: Aomi/Info.plist
        GENERATE_INFOPLIST_FILE: false
      configs:
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Aomi Dist"
    dependencies:
      - package: ParaSwift
      - package: MarkdownUI

  AomiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AomiTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Aomi
